<!doctype html>
<html lang="lt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dovanos testas 🌷</title>

<style>
:root{
--bg:#ffc37c;
--card:rgba(254, 155, 26, 0.95);
--text:#fff;
--muted:#a1a1aa;
--yes:#22c55e;
--no:#ef4444;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
height:100vh;
overflow:hidden;

/* VISADA CENTRAS */
display:flex;
align-items:center;
justify-content:center;
}

/* PROGRESS */
.progress{
position:fixed;
top:0;left:0;right:0;
height:4px;
background:#1f2937;
}
.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#22c55e,#3b82f6);
transition:.3s;
}

/* STEP WRAPPER */
.scene{
display:none;
width:100%;
justify-content:center;
align-items:center;
}

.scene.active{
display:flex;
}

/* CARD */
.card{
width:min(760px,92vw);
background:var(--card);
padding:32px;
border-radius:24px;
box-shadow:0 40px 120px rgba(0,0,0,.6);
text-align:center;

/* tik čia leidžiam fade */
animation:fade .25s ease;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

h1{font-size:22px;line-height:1.5}
p{color:var(--muted);line-height:1.6}

/* BUTTONS */
.controls{
display:flex;
gap:12px;
margin-top:18px;
justify-content:center;
flex-wrap:wrap;
position:relative;
}

.btn{
border:0;
padding:14px 18px;
border-radius:14px;
font-weight:700;
cursor:pointer;
}

.yes{background:var(--yes);color:#fff}
.no{background:var(--no);color:#fff}

/* FINAL RUNAWAY */
.no-run{
position:fixed;
left:50%;
top:60%;
transition:.15s;
}

/* INPUT FIX */
input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:1px solid #333;
background:#0f172a;
color:#fff;
}

/* OVERLAY */
.overlay{
position:fixed;
inset:0;
display:none;
place-items:center;
background:rgba(0,0,0,.75);
}

.modal{
background:#111827;
padding:26px;
border-radius:20px;
width:min(700px,92vw);
text-align:center;
}

</style>
</head>

<body>

<div class="progress"><div class="bar" id="bar"></div></div>

<!-- 0 -->
<div class="scene active">
<div class="card">
<h1>Miela Dalyte 🌷</h1>
<p>Trumpas testas parinks Jums dovaną.</p>
<div class="controls">
<button class="btn yes" onclick="next()">Pradėti</button>
</div>
</div>
</div>

<!-- 1 -->
<div class="scene">
<div class="card">
<h1>Koks Jūs esate žmogus?</h1>
<div class="controls">
<button class="btn yes" onclick="next()">Energinga</button>
<button class="btn yes" onclick="next()">Rami</button>
<button class="btn yes" onclick="next()">Iššūkių mėgėja</button>
</div>
</div>
</div>

<!-- 2 -->
<div class="scene">
<div class="card">
<h1>Kas Jums svarbiausia?</h1>
<div class="controls">
<button class="btn yes" onclick="next()">Patirtys</button>
<button class="btn yes" onclick="next()">Ramybė</button>
<button class="btn yes" onclick="next()">Netikėtumai</button>
</div>
</div>
</div>

<!-- 3 -->
<div class="scene">
<div class="card">
<h1>Pasirinkite datą 📅</h1>

<input type="date">
<input type="time">

<div class="controls">
<button class="btn yes" onclick="next()">Tęsti</button>
</div>
</div>
</div>

<!-- 4 -->
<div class="scene">
<div class="card">
<h1>Ar mėgstate egzotinius skonius?</h1>
<div class="controls">
<button class="btn yes" onclick="next()">Taip</button>
<button class="btn yes" onclick="next()">Kartais</button>
</div>
</div>
</div>

<!-- 5 FINAL -->
<div class="scene">
<div class="card">
<h1>🎉 Jūsų dovana parinkta</h1>

<p>Egzotinė degustacinė vakarienė su kulinariniu šou.</p>

<p><b>Ar tai atitinka Jūsų norus?</b></p>

<div class="controls">
<button class="btn yes" onclick="openFinal()">TAIP</button>
<button class="btn no no-run" id="noFinal">NE</button>
</div>
</div>
</div>

<!-- FINAL -->
<div class="overlay" id="overlay">
<div class="modal">
<h2>✨ Taip ir manėme!</h2>

<a class="btn yes"
href="tickets-6a342e9b334140.49859372.pdf"
target="_blank">
🎫 Atsisiųsti bilietus
</a>

</div>
</div>

<script>

let step=0;
const scenes=document.querySelectorAll(".scene");
const bar=document.getElementById("bar");

function update(){

scenes.forEach((s,i)=>{
s.classList.toggle("active",i===step);
});

bar.style.width=(step/(scenes.length-1))*100+"%";
}

function next(){
if(step<scenes.length-1){
step++;
update();
}
}

function openFinal(){
document.getElementById("overlay").style.display="grid";
}

/* runaway ONLY final */
const noFinal=document.getElementById("noFinal");

noFinal.addEventListener("mouseenter",()=>{
noFinal.style.position="fixed";
noFinal.style.left=Math.random()*80+"vw";
noFinal.style.top=Math.random()*80+"vh";
});

update();

</script>

</body>
</html>
